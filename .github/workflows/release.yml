name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Build app bundle, zip and disk image
        run: VERSION="${GITHUB_REF_NAME#v}" ./make-app.sh --dist

      - name: Verify the disk image
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="dist/Swab-${VERSION}.dmg"
          test -f "$DMG"
          # Both architectures, or the download is broken for every Intel Mac.
          lipo -archs dist/Swab.app/Contents/MacOS/Swab | tee /dev/stderr | grep -q x86_64
          lipo -archs dist/Swab.app/Contents/MacOS/Swab | grep -q arm64
          # Mount it the way a downloader would, and confirm the drag-to-install
          # layout survived packaging: the app plus an /Applications alias.
          hdiutil attach "$DMG" -nobrowse -quiet -mountpoint /tmp/swabdmg
          test -x /tmp/swabdmg/Swab.app/Contents/MacOS/Swab
          test -L /tmp/swabdmg/Applications
          codesign --verify --deep --strict /tmp/swabdmg/Swab.app
          hdiutil detach /tmp/swabdmg -quiet

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/Swab-*.dmg dist/Swab-*.zip \
            --title "Swab $GITHUB_REF_NAME" \
            --notes-file - <<'NOTES'
          Stage a spotless desktop for screenshots and screen recordings, then
          put every last thing back exactly the way it was.

          **Install:** download the `.dmg`, open it, and drag `Swab.app` to the
          `Applications` folder beside it. (The `.zip` is the same app, if you
          prefer it.) Universal — Apple Silicon and Intel, macOS 14+.

          The app is ad-hoc signed rather than notarized, so macOS quarantines
          it on download. Open it once via **System Settings → Privacy &
          Security → Open Anyway**, or clear the flag yourself:

          ```
          xattr -d com.apple.quarantine /Applications/Swab.app
          ```
          NOTES
